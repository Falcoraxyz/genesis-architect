<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Brain Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #020410;
    --panel-bg:  rgba(6, 8, 28, 0.96);
    --border:    rgba(255, 255, 255, 0.08);
    --text:      #c8d0e8;
    --text-dim:  #5a6080;
    --cyan:      #00f5ff;
    --purple:    #b084ff;
    --amber:     #ffb347;
    --red:       #ff6b6b;
    --red-hot:   #ff2020;
    --mono:      'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Top bar */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: rgba(2, 4, 16, 0.85);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    z-index: 100;
  }

  #topbar h1 {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--cyan);
    text-transform: uppercase;
    opacity: 0.9;
  }

  #topbar .meta {
    font-size: 11px;
    color: var(--text-dim);
  }

  .legend {
    display: flex;
    gap: 16px;
    margin-left: auto;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Side panel */
  #panel {
    position: fixed;
    top: 44px; right: 0;
    width: 380px;
    height: calc(100vh - 44px);
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    backdrop-filter: blur(20px);
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto;
    z-index: 90;
    padding: 0 0 80px;
  }

  #panel.open {
    transform: translateX(0);
  }

  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .panel-header {
    position: sticky;
    top: 0;
    background: var(--panel-bg);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .panel-type {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .panel-title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    line-height: 1.4;
  }

  #panel-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    width: 28px; height: 28px;
    border-radius: 4px;
    font-size: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
  }

  #panel-close:hover { color: #fff; border-color: var(--text); }

  .panel-body { padding: 16px 20px; }

  .panel-section { margin-bottom: 20px; }

  .panel-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .panel-value {
    font-size: 12px;
    color: var(--text);
    line-height: 1.6;
  }

  .tag {
    display: inline-block;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 7px;
    font-size: 10px;
    color: var(--text-dim);
    margin: 2px 2px 2px 0;
  }

  .severity-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .severity-low      { background: rgba(255,107,107,0.1); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }
  .severity-medium   { background: rgba(255,179,71,0.1);  color: #ffb347; border: 1px solid rgba(255,179,71,0.3); }
  .severity-high     { background: rgba(255,100,50,0.15); color: #ff6432; border: 1px solid rgba(255,100,50,0.4); }
  .severity-critical { background: rgba(255,32,32,0.2);   color: #ff2020; border: 1px solid rgba(255,32,32,0.5); }

  .code-block {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 11px;
    line-height: 1.5;
    color: #a8b8d0;
    overflow-x: auto;
    white-space: pre;
    max-height: 300px;
    overflow-y: auto;
  }

  .decision-option {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }

  .decision-option .option-label {
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }

  .decision-option .pro { color: #4ade80; font-size: 11px; }
  .decision-option .con { color: #f87171; font-size: 11px; }

  .chosen-badge {
    display: inline-block;
    background: rgba(0,245,255,0.1);
    border: 1px solid rgba(0,245,255,0.3);
    color: var(--cyan);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .file-list {
    list-style: none;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 2;
  }

  .file-list li::before {
    content: '  ';
    color: var(--text-dim);
  }

  /* Synthesize */
  #synthesize-btn {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 245, 255, 0.08);
    border: 1px solid rgba(0, 245, 255, 0.3);
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 24px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s, border-color 0.2s;
    z-index: 100;
  }

  #synthesize-btn:hover {
    background: rgba(0, 245, 255, 0.15);
    border-color: rgba(0, 245, 255, 0.6);
  }

  #synthesize-btn:disabled {
    opacity: 0.4;
    cursor: default;
  }

  /* Synthesis overlay */
  #synthesis-overlay {
    position: fixed;
    inset: 44px 0 0 0;
    background: rgba(2, 4, 16, 0.97);
    backdrop-filter: blur(20px);
    z-index: 200;
    display: none;
    flex-direction: column;
  }

  #synthesis-overlay.visible { display: flex; }

  .synthesis-header {
    padding: 20px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .synthesis-header h2 {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cyan);
  }

  #synthesis-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px 12px;
    font-family: var(--mono);
    font-size: 11px;
    border-radius: 3px;
    transition: color 0.15s;
  }

  #synthesis-close:hover { color: #fff; }

  #synthesis-content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    max-width: 820px;
  }

  #synthesis-content::-webkit-scrollbar { width: 4px; }
  #synthesis-content::-webkit-scrollbar-thumb { background: var(--border); }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: var(--cyan);
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(6, 8, 28, 0.92);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--text);
    z-index: 150;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 240px;
  }

  #tooltip.show { opacity: 1; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="topbar">
  <h1>Genesis Brain Map</h1>
  <span class="meta" id="meta-counts"></span>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00f5ff;box-shadow:0 0 6px #00f5ff"></div>Project</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b084ff;box-shadow:0 0 4px #b084ff"></div>Component</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffb347"></div>Decision</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>Lesson</div>
  </div>
</div>

<div id="panel">
  <div class="panel-header">
    <div>
      <div class="panel-type" id="panel-type"></div>
      <div class="panel-title" id="panel-title"></div>
    </div>
    <button id="panel-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div id="tooltip"></div>

<button id="synthesize-btn" onclick="runSynthesis()">Synthesize</button>

<div id="synthesis-overlay">
  <div class="synthesis-header">
    <h2>Knowledge Synthesis</h2>
    <button id="synthesis-close" onclick="closeSynthesis()">close</button>
  </div>
  <div id="synthesis-content"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const GRAPH = __GRAPH_DATA__;
const { nodes, edges, meta } = GRAPH;

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
}

window.addEventListener('resize', () => { resize(); initLayout(); draw(); });
resize();

// ─── NODE CONFIG ─────────────────────────────────────────────────────────────
function nodeColor(n) {
  if (n.type === 'project')   return '#00f5ff';
  if (n.type === 'component') return '#b084ff';
  if (n.type === 'decision')  return '#ffb347';
  if (n.severity === 'critical' || n.severity === 'high') return '#ff2020';
  return '#ff6b6b';
}

function nodeRadius(n) {
  if (n.type === 'project')   return 22;
  if (n.type === 'component') return 14;
  if (n.type === 'decision')  return 9;
  if (n.severity === 'critical') return 14;
  if (n.severity === 'high')     return 11;
  return 7;
}

// ─── LAYOUT ──────────────────────────────────────────────────────────────────
function initLayout() {
  const cx = W / 2, cy = H / 2;
  nodes.forEach((n, i) => {
    if (!n._placed) {
      if (n.type === 'project') {
        const angle = (i / nodes.filter(x => x.type === 'project').length) * Math.PI * 2;
        n.x = cx + Math.cos(angle) * 120;
        n.y = cy + Math.sin(angle) * 120;
      } else {
        const angle = Math.random() * Math.PI * 2;
        const dist = 180 + Math.random() * 260;
        n.x = cx + Math.cos(angle) * dist;
        n.y = cy + Math.sin(angle) * dist;
      }
      n.vx = 0; n.vy = 0;
      n._placed = true;
    }
  });
}

initLayout();

function nodeById(id) { return nodes.find(n => n.id === id); }

function simulate(iterations) {
  const REPULSION = 7000;
  const ATTRACTION = 0.05;
  const DAMPING = 0.82;

  for (let iter = 0; iter < iterations; iter++) {
    // Repulsion between all pairs
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist2 = dx * dx + dy * dy + 0.01;
        const force = REPULSION / dist2;
        const dist = Math.sqrt(dist2);
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }
    // Attraction along edges
    edges.forEach(e => {
      const a = nodeById(e.source), b = nodeById(e.target);
      if (!a || !b) return;
      const dx = b.x - a.x, dy = b.y - a.y;
      a.vx += dx * ATTRACTION; a.vy += dy * ATTRACTION;
      b.vx -= dx * ATTRACTION; b.vy -= dy * ATTRACTION;
    });
    // Center gravity
    nodes.forEach(n => {
      n.vx += (W / 2 - n.x) * 0.003;
      n.vy += (H / 2 - n.y) * 0.003;
    });
    // Apply velocity with damping
    nodes.forEach(n => {
      n.vx *= DAMPING; n.vy *= DAMPING;
      n.x += n.vx; n.y += n.vy;
    });
  }
}

simulate(500);

// ─── STARS ───────────────────────────────────────────────────────────────────
const stars = Array.from({ length: 280 }, () => ({
  x: Math.random() * 3000,
  y: Math.random() * 2000,
  r: Math.random() * 1.2,
  a: 0.2 + Math.random() * 0.6,
}));

// ─── DRAW ─────────────────────────────────────────────────────────────────────
let selected = null;
let camera = { x: 0, y: 0, scale: 1 };
let animFrame = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(
      (s.x + camera.x * 0.08) % W,
      (s.y + camera.y * 0.08) % H,
      s.r, 0, Math.PI * 2
    );
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });

  ctx.save();
  ctx.translate(W / 2 + camera.x, H / 2 + camera.y);
  ctx.scale(camera.scale, camera.scale);
  ctx.translate(-W / 2, -H / 2);

  // Edges
  edges.forEach(e => {
    const a = nodeById(e.source), b = nodeById(e.target);
    if (!a || !b) return;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Pulse ring on selected
  if (selected) {
    animFrame++;
    const r = nodeRadius(selected) + 6 + Math.sin(animFrame * 0.06) * 3;
    ctx.beginPath();
    ctx.arc(selected.x, selected.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,0.25)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Nodes
  nodes.forEach(n => {
    const color = nodeColor(n);
    const r = nodeRadius(n);
    const isSelected = n === selected;

    // Glow
    if (n.type === 'project' || isSelected) {
      const glow = ctx.createRadialGradient(n.x, n.y, r * 0.4, n.x, n.y, r * 3.5);
      glow.addColorStop(0, color + '30');
      glow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(n.x, n.y, r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = color + (isSelected ? 'ff' : '22');
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = isSelected ? 2 : 1.5;
    ctx.stroke();

    // Label
    ctx.fillStyle = isSelected ? '#fff' : 'rgba(200,208,232,0.7)';
    ctx.font = `${isSelected ? '600 ' : ''}11px ${getComputedStyle(document.body).fontFamily}`;
    ctx.textAlign = 'center';
    ctx.fillText(n.label.length > 22 ? n.label.slice(0, 20) + '…' : n.label, n.x, n.y + r + 14);
  });

  ctx.restore();
  requestAnimationFrame(draw);
}

draw();

// Update meta
const typeCount = t => nodes.filter(n => n.type === t).length;
document.getElementById('meta-counts').textContent =
  `${typeCount('project')} projects · ${typeCount('component')} components · ${typeCount('decision')} decisions · ${typeCount('lesson')} lessons`;

// ─── INTERACTION ──────────────────────────────────────────────────────────────
let dragging = null, dragOffset = { x: 0, y: 0 };
let panStart = null, panOrigin = { x: 0, y: 0 };

function toWorld(px, py) {
  return {
    x: (px - W / 2 - camera.x) / camera.scale + W / 2,
    y: (py - H / 2 - camera.y) / camera.scale + H / 2,
  };
}

function hitTest(px, py) {
  const { x, y } = toWorld(px, py);
  return nodes.find(n => {
    const dx = n.x - x, dy = n.y - y;
    return Math.sqrt(dx * dx + dy * dy) <= nodeRadius(n) + 4;
  });
}

canvas.addEventListener('mousedown', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    dragging = hit;
    const { x, y } = toWorld(e.clientX, e.clientY);
    dragOffset = { x: hit.x - x, y: hit.y - y };
  } else {
    panStart = { x: e.clientX, y: e.clientY };
    panOrigin = { x: camera.x, y: camera.y };
  }
});

canvas.addEventListener('mousemove', e => {
  const tooltip = document.getElementById('tooltip');
  if (dragging) {
    const { x, y } = toWorld(e.clientX, e.clientY);
    dragging.x = x + dragOffset.x;
    dragging.y = y + dragOffset.y;
    return;
  }
  if (panStart) {
    camera.x = panOrigin.x + (e.clientX - panStart.x);
    camera.y = panOrigin.y + (e.clientY - panStart.y);
    return;
  }
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    tooltip.textContent = hit.label;
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
    tooltip.classList.add('show');
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.classList.remove('show');
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('mouseup', e => {
  if (!dragging && !panStart) return;
  const moved = panStart
    ? Math.abs(e.clientX - panStart.x) + Math.abs(e.clientY - panStart.y) > 4
    : false;
  if (dragging) { dragging = null; return; }
  if (!moved && panStart) {
    // treat as click
    const hit = hitTest(e.clientX, e.clientY);
    if (hit) { selected = hit; openPanel(hit); }
    else { selected = null; closePanel(); }
  }
  dragging = null;
  panStart = null;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  camera.scale = Math.max(0.3, Math.min(3, camera.scale * factor));
}, { passive: false });

// ─── PANEL ────────────────────────────────────────────────────────────────────
function openPanel(n) {
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-type').textContent = n.type.toUpperCase();
  document.getElementById('panel-type').style.color = nodeColor(n);
  document.getElementById('panel-title').textContent = n.label;
  document.getElementById('panel-body').innerHTML = renderPanelBody(n);
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  selected = null;
}

function section(label, content) {
  if (!content) return '';
  return `<div class="panel-section">
    <div class="panel-label">${label}</div>
    <div class="panel-value">${content}</div>
  </div>`;
}

function renderPanelBody(n) {
  const d = n.data;
  if (n.type === 'project') {
    const stack = (d.tech_stack || []).map(t => `<span class="tag">${t}</span>`).join('');
    const files = (d.files_created || []).map(f => `<li>${f}</li>`).join('');
    const lessons = (d.lessons || []).join('<br>') || '—';
    const status = `<span class="tag" style="color:${d.status==='active'?'#4ade80':'#888'}">${d.status}</span>`;
    return [
      section('Status', status),
      section('Created', new Date(d.created_at).toLocaleDateString()),
      d.description ? section('Description', d.description) : '',
      stack ? section('Tech Stack', stack) : '',
      files ? section('Files Created', `<ul class="file-list">${files}</ul>`) : '',
      section('Lessons', lessons),
    ].join('');
  }

  if (n.type === 'component') {
    const tags = (d.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
    const code = d.code ? `<div class="code-block">${escHtml(d.code)}</div>` : '';
    return [
      section('Language', `<span class="tag">${d.language}</span>`),
      section('Used', `${d.usage_count} time${d.usage_count !== 1 ? 's' : ''}`),
      d.description ? section('Description', d.description) : '',
      tags ? section('Tags', tags) : '',
      code ? section('Code', code) : '',
    ].join('');
  }

  if (n.type === 'decision') {
    const options = (d.options_considered || []).map(opt => `
      <div class="decision-option">
        <div class="option-label">
          ${escHtml(opt.option)}
          ${opt.option === d.chosen_option ? '<span class="chosen-badge">chosen</span>' : ''}
        </div>
        ${(opt.pros || []).map(p => `<div class="pro">+ ${p}</div>`).join('')}
        ${(opt.cons || []).map(c => `<div class="con">- ${c}</div>`).join('')}
      </div>`).join('');
    return [
      d.context ? section('Context', d.context) : '',
      options ? section('Options', options) : '',
      section('Reasoning', d.reasoning || '—'),
      section('Outcome', d.outcome || 'Not yet observed'),
    ].join('');
  }

  if (n.type === 'lesson') {
    const sev = d.severity || 'low';
    return [
      section('Severity', `<span class="severity-badge severity-${sev}">${sev}</span>`),
      section('Problem', d.problem),
      d.root_cause ? section('Root Cause', d.root_cause) : '',
      section('Solution', d.solution),
      d.prevention ? section('Prevention', d.prevention) : '',
      (d.tags||[]).length ? section('Tags', d.tags.map(t=>`<span class="tag">${t}</span>`).join('')) : '',
    ].join('');
  }

  return '';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── SYNTHESIS ────────────────────────────────────────────────────────────────
function runSynthesis() {
  const overlay = document.getElementById('synthesis-overlay');
  const content = document.getElementById('synthesis-content');
  overlay.classList.add('visible');
  document.getElementById('synthesize-btn').disabled = true;

  // Build summary for the AI
  const summary = {
    projects: nodes.filter(n=>n.type==='project').map(n=>({
      name: n.label,
      stack: n.data.tech_stack,
      lessons: n.data.lessons,
      status: n.data.status,
    })),
    components: nodes.filter(n=>n.type==='component').map(n=>({
      name: n.label,
      language: n.data.language,
      usageCount: n.data.usage_count,
      tags: n.data.tags,
    })).sort((a,b)=>b.usageCount-a.usageCount),
    lessons: nodes.filter(n=>n.type==='lesson').map(n=>({
      title: n.label,
      severity: n.data.severity,
      problem: n.data.problem,
      solution: n.data.solution,
    })).filter(l=>l.severity==='critical'||l.severity==='high'),
    totalEdges: edges.length,
  };

  const prompt = `You are reviewing a software engineer's complete project history stored in a knowledge graph. Here is the data:

${JSON.stringify(summary, null, 2)}

Output a synthesis in exactly this format (plain text, no markdown, no emojis):

KNOWLEDGE SYNTHESIS
Generated: ${new Date().toLocaleString()}

MOST REUSED COMPONENTS
[list the top components by usage count with their language and why they matter]

RECURRING PROBLEMS
[problems that appear across multiple projects or are high/critical severity]

STRONGEST PATTERNS
[tech decisions or approaches that have appeared consistently and proven themselves]

CRITICAL LESSONS
[all high and critical lessons with their solutions]

RECOMMENDED NEXT ACTIONS
[3 to 5 concrete, specific suggestions grounded in the actual data above — reference real project or component names]

Be direct. No filler sentences. Every line must add information.`;

  content.innerHTML = '<span class="cursor"></span>';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      stream: true,
      messages: [{ role: 'user', content: prompt }],
    }),
  }).then(async res => {
    if (!res.ok) { throw new Error(`API error ${res.status}`); }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let text = '';
    content.innerHTML = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      chunk.split('\n').forEach(line => {
        if (!line.startsWith('data: ')) return;
        const data = line.slice(6);
        if (data === '[DONE]') return;
        try {
          const json = JSON.parse(data);
          if (json.type === 'content_block_delta' && json.delta?.text) {
            text += json.delta.text;
            content.textContent = text;
            content.scrollTop = content.scrollHeight;
          }
        } catch (_) {}
      });
    }
  }).catch(err => {
    // Fallback: local summary without API
    const components = summary.components.slice(0, 5);
    const criticalLessons = summary.lessons.filter(l=>l.severity==='critical');

    content.textContent = [
      'KNOWLEDGE SYNTHESIS',
      `Generated: ${new Date().toLocaleString()}`,
      '',
      `OVERVIEW`,
      `${summary.projects.length} projects · ${summary.components.length} components · ${nodes.filter(n=>n.type==='lesson').length} lessons recorded`,
      '',
      'MOST REUSED COMPONENTS',
      ...components.map(c => `  ${c.name} (${c.language}) — used ${c.usageCount} time${c.usageCount!==1?'s':''}`),
      '',
      'CRITICAL LESSONS',
      ...(criticalLessons.length ? criticalLessons.map(l=>`  ${l.title}: ${l.solution}`) : ['  None recorded']),
      '',
      `[API unavailable — connect to Anthropic API for full synthesis]`,
    ].join('\n');
  }).finally(() => {
    document.getElementById('synthesize-btn').disabled = false;
  });
}

function closeSynthesis() {
  document.getElementById('synthesis-overlay').classList.remove('visible');
  document.getElementById('synthesis-content').innerHTML = '';
}
</script>
